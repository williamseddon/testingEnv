[theme]
# Base gives us light-mode Streamlit defaults (light text colors, etc.)
base = "light"

# Primary action color — matches --accent in the app CSS (#6366f1 indigo)
primaryColor = "#6366f1"

# Main content area: clearly-not-white cool gray.
# White cards and charts will pop visibly against this.
backgroundColor = "#eef0f4"

# Sidebar, code blocks, st.container borders:
# Slightly lighter than the main bg so the sidebar reads as a panel, not a duplicate.
secondaryBackgroundColor = "#f5f7fb"

# All body text: near-black navy for max readability
textColor = "#0f172a"

font = "sans serif"
